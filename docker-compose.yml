services:
  # ===========================================
  # KEYCLOAK - Identity Provider (IdP)
  # ===========================================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak-idp
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak123
      - KC_HEALTH_ENABLED=true
      - JAVA_OPTS_APPEND=-Xms256m -Xmx512m
    volumes:
      - ./keycloak-config/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sso-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ===========================================
  # POSTGRESQL - Base de datos para Keycloak
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sso-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # APP DEMO 1 - Portal de Empleados (Node.js)
  # ===========================================
  app-portal:
    build:
      context: ./apps/demo-app-1
      dockerfile: Dockerfile
    container_name: app-portal-empleados
    ports:
      - "3001:3000"
    environment:
      - APP_NAME=Portal de Empleados
      - APP_COLOR=#3498db
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - KEYCLOAK_REALM=demo-lab
      - KEYCLOAK_CLIENT_ID=app-portal
      - KEYCLOAK_CLIENT_SECRET=portal-secret-123
      - SESSION_SECRET=super-secret-session-key-portal
      - CALLBACK_URL=http://localhost:3001/callback
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - sso-network

  # ===========================================
  # APP DEMO 2 - Sistema de Reportes (Node.js)
  # ===========================================
  app-reportes:
    build:
      context: ./apps/demo-app-2
      dockerfile: Dockerfile
    container_name: app-sistema-reportes
    ports:
      - "3002:3000"
    environment:
      - APP_NAME=Sistema de Reportes
      - APP_COLOR=#e74c3c
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - KEYCLOAK_REALM=demo-lab
      - KEYCLOAK_CLIENT_ID=app-reportes
      - KEYCLOAK_CLIENT_SECRET=reportes-secret-456
      - SESSION_SECRET=super-secret-session-key-reportes
      - CALLBACK_URL=http://localhost:3002/callback
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - sso-network

  # ===========================================
  # MAILHOG - Servidor de correo para pruebas
  # ===========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - sso-network

networks:
  sso-network:
    driver: bridge

volumes:
  postgres_data:
